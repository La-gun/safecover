<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SafeCover – Multi-Industry Demo</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f0f2f5; color: #333; }
    .header {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #fff;
      padding: 24px;
      text-align: center;
    }
    .header h1 { margin: 0 0 8px; font-size: 1.75rem; }
    .header p { margin: 0; opacity: 0.9; font-size: 0.95rem; }
    .scenario-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 16px;
      justify-content: center;
      background: #fff;
      border-bottom: 1px solid #e0e0e0;
    }
    .scenario-tab {
      padding: 10px 16px;
      border: 1px solid #ddd;
      background: #fff;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .scenario-tab:hover { border-color: #1a1a2e; background: #f8f9fa; }
    .scenario-tab.active { background: #1a1a2e; color: #fff; border-color: #1a1a2e; }
    .viewport-toggle {
      display: flex;
      gap: 8px;
      padding: 8px 16px;
      background: #fff;
      justify-content: center;
    }
    .viewport-toggle button {
      padding: 6px 12px;
      border: 1px solid #ccc;
      background: #fff;
      cursor: pointer;
      border-radius: 6px;
      font-size: 12px;
    }
    .viewport-toggle button.active { background: #1a1a2e; color: #fff; }
    .demo-container { padding: 20px; max-width: 960px; margin: 0 auto; }
    .checkout-frame {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      overflow: hidden;
      margin: 0 auto;
      transition: width 0.3s;
    }
    .checkout-frame.desktop { width: 100%; max-width: 900px; }
    .checkout-frame.mobile { width: 375px; }
    .checkout-layout { display: flex; min-height: 400px; }
    .checkout-frame.mobile .checkout-layout { flex-direction: column; }
    .checkout-main { flex: 1; padding: 24px; }
    .checkout-sidebar {
      width: 340px;
      padding: 24px;
      background: #fafafa;
      border-left: 1px solid #eee;
    }
    .checkout-frame.mobile .checkout-sidebar { width: 100%; border-left: none; border-top: 1px solid #eee; }
    .section-title { font-size: 16px; font-weight: 600; margin: 0 0 12px; }
    .cart-item {
      display: flex;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid #eee;
    }
    .cart-item:last-child { border-bottom: none; }
    .cart-item-thumb { width: 48px; height: 48px; background: #eee; border-radius: 6px; flex-shrink: 0; }
    .cart-item-details { flex: 1; min-width: 0; }
    .cart-item-name { font-weight: 500; font-size: 14px; }
    .cart-item-meta { font-size: 12px; color: #666; margin-top: 2px; }
    .cart-item-price { font-weight: 600; font-size: 14px; }
    .order-row { display: flex; justify-content: space-between; padding: 6px 0; font-size: 13px; }
    .order-row.total { font-weight: 700; font-size: 16px; border-top: 1px solid #ddd; margin-top: 8px; padding-top: 12px; }
    .safecover-widget {
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 16px;
      margin-top: 16px;
      background: #fff;
    }
    .safecover-widget h3 { margin: 0 0 10px; font-size: 1em; font-weight: 600; }
    .safecover-widget ul { padding-left: 18px; margin: 0 0 12px; font-size: 12px; line-height: 1.6; color: #555; }
    .safecover-widget label { display: flex; align-items: center; cursor: pointer; font-size: 13px; }
    .safecover-widget input[type="checkbox"] { width: 18px; height: 18px; margin-right: 10px; accent-color: #1a1a2e; }
    .safecover-status { margin-top: 10px; font-size: 12px; display: none; }
    .safecover-status.show { display: block; }
    .safecover-status.success { color: #0a7c42; }
    .pay-btn {
      width: 100%;
      padding: 14px;
      background: #1a1a2e;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 16px;
    }
    .pay-btn:hover { background: #16213e; }
    .industry-badge { font-size: 11px; color: #666; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
  </style>
</head>
<body>
  <div class="header">
    <h1>SafeCover Multi-Industry Demo</h1>
    <p>Embedded microinsurance across logistics, healthcare, hospitality, food, cyber & more</p>
  </div>
  <div class="scenario-tabs" id="scenario-tabs"></div>
  <div class="viewport-toggle">
    <button id="btn-desktop" class="active">Desktop</button>
    <button id="btn-mobile">Mobile</button>
  </div>
  <div class="demo-container">
    <div id="checkout-frame" class="checkout-frame desktop">
      <div class="checkout-layout">
        <div class="checkout-main">
          <div class="industry-badge" id="industry-badge"></div>
          <h2 class="section-title" id="checkout-title"></h2>
          <div id="checkout-fields"></div>
          <h2 class="section-title" style="margin-top: 20px;">Protection</h2>
          <div id="safecover-widget-container"></div>
        </div>
        <div class="checkout-sidebar">
          <h2 class="section-title">Order summary</h2>
          <div id="cart-items"></div>
          <div class="order-row"><span>Subtotal</span><span id="subtotal">$0</span></div>
          <div class="order-row" id="insurance-row" style="display:none"><span id="insurance-label">Insurance</span><span id="insurance-amount">$0</span></div>
          <div class="order-row"><span>Total</span><span id="total">$0</span></div>
          <button class="pay-btn" id="pay-btn">Complete</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    (function () {
      var API = window.location.origin;
      var scenarios = [];
      var currentScenario = null;

      var scenarioData = {
        logistics: {
          title: 'Ship your package',
          fields: '<p>Origin: NYC → Destination: LA</p><p>Carrier: Express Freight</p>',
          items: [
            { name: 'Electronics shipment', meta: '50 lbs, 2 pallets', price: 450 },
            { name: 'Fragile handling fee', meta: '', price: 35 }
          ],
          payLabel: 'Ship & protect'
        },
        healthcare: {
          title: 'Book your appointment',
          fields: '<p>Dr. Sarah Chen, General Practice</p><p>Date: Tomorrow 10:00 AM</p>',
          items: [
            { name: 'Consultation', meta: 'In-office visit', price: 120 },
            { name: 'Lab work', meta: 'Blood panel', price: 85 }
          ],
          payLabel: 'Confirm booking'
        },
        hospitality: {
          title: 'Complete your booking',
          fields: '<p>Grand Hotel, 3 nights</p><p>Check-in: Mar 15 – Check-out: Mar 18</p>',
          items: [
            { name: 'Deluxe Room', meta: '3 nights', price: 420 },
            { name: 'Resort fee', meta: '', price: 45 }
          ],
          payLabel: 'Book now'
        },
        food: {
          title: 'Delivery details',
          fields: '<p>Address: 123 Oak St, Apt 4B</p><p>Est. delivery: 35 min</p>',
          items: [
            { name: 'Burger combo', meta: 'x2', price: 24 },
            { name: 'Fries & drink', meta: 'x2', price: 12 },
            { name: 'Delivery fee', meta: '', price: 4 }
          ],
          payLabel: 'Place order'
        },
        cyber: {
          title: 'Complete subscription',
          fields: '<p>Premium VPN + Identity Monitor</p><p>Billed annually</p>',
          items: [
            { name: 'CyberShield Pro', meta: '12 months', price: 89 },
            { name: 'Family plan add-on', meta: '5 devices', price: 29 }
          ],
          payLabel: 'Subscribe'
        },
        mobility: {
          title: 'Start your trip',
          fields: '<p>Ride from Downtown to Airport</p><p>Est. 25 min, 12 miles</p>',
          items: [
            { name: 'Base fare', meta: 'Ride-share', price: 18 },
            { name: 'Distance fee', meta: '12 miles', price: 12 }
          ],
          payLabel: 'Start trip'
        },
        parametric: {
          title: 'Event protection',
          fields: '<p>Outdoor Concert - June 15</p><p>Rain delay payout: $50 if rainfall > 5mm</p>',
          items: [
            { name: 'Ticket', meta: 'General admission', price: 45 },
            { name: 'Parametric cover', meta: 'Weather trigger', price: 2 }
          ],
          payLabel: 'Purchase'
        },
        gadgets: {
          title: 'Protect your device',
          fields: '<p>iPhone 15 Pro – 256GB</p><p>12-month accidental damage cover</p>',
          items: [
            { name: 'iPhone 15 Pro', meta: '256GB', price: 999 },
            { name: 'Screen protector', meta: '', price: 29 }
          ],
          payLabel: 'Checkout'
        },
        events: {
          title: 'Complete ticket purchase',
          fields: '<p>Summer Music Festival – Aug 20</p><p>Cancel-for-any-reason refund available</p>',
          items: [
            { name: 'VIP Pass', meta: '2-day access', price: 199 },
            { name: 'Parking pass', meta: '', price: 25 }
          ],
          payLabel: 'Buy tickets'
        },
        retail: {
          title: 'Shipping information',
          fields: '<p>Email: customer@example.com</p><p>Address: 123 Main St, NY</p>',
          items: [
            { name: 'Wireless Headphones', meta: 'Qty: 1', price: 89 },
            { name: 'USB-C Cable Pack', meta: 'Qty: 2', price: 24 }
          ],
          payLabel: 'Pay now'
        }
      };

      function renderScenario(scenario) {
        currentScenario = scenario;
        var data = scenarioData[scenario.id] || scenarioData.retail;

        document.getElementById('industry-badge').textContent = scenario.name;
        document.getElementById('checkout-title').textContent = data.title;
        document.getElementById('checkout-fields').innerHTML = data.fields;

        var subtotal = data.items.reduce(function (s, i) { return s + i.price; }, 0);
        document.getElementById('subtotal').textContent = '$' + subtotal.toFixed(2);
        document.getElementById('total').textContent = '$' + subtotal.toFixed(2);
        document.getElementById('pay-btn').textContent = data.payLabel + ' $' + subtotal.toFixed(2);

        var cartHtml = data.items.map(function (item) {
          return '<div class="cart-item"><div class="cart-item-thumb"></div><div class="cart-item-details">' +
            '<div class="cart-item-name">' + item.name + '</div>' +
            (item.meta ? '<div class="cart-item-meta">' + item.meta + '</div>' : '') +
            '</div><div class="cart-item-price">$' + item.price.toFixed(2) + '</div></div>';
        }).join('');
        document.getElementById('cart-items').innerHTML = cartHtml;

        var benefits = (scenario.benefits || []).map(function (b) { return '<li>' + b + '</li>'; }).join('');
        var widgetHtml = '<div class="safecover-widget">' +
          '<h3>✓ Add Protection with SafeCover™</h3>' +
          '<ul>' + benefits + '</ul>' +
          '<label><input type="checkbox" id="add-insurance">' +
          '<span>' + (scenario.label || 'Add protection') + ' for <strong id="premium-display">$--</strong></span></label>' +
          '<div id="insurance-status" class="safecover-status"></div></div>';

        document.getElementById('safecover-widget-container').innerHTML = widgetHtml;

        var itemsForApi = data.items.map(function (i) { return { value: i.price }; });
        currentScenario.quote_items = itemsForApi;
        fetch(API + '/api/quote', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'X-API-Key': 'demo' },
          body: JSON.stringify({ items: itemsForApi, scenario: scenario.id })
        })
          .then(function (r) { return r.json(); })
          .then(function (q) {
            var el = document.getElementById('premium-display');
            if (el) el.textContent = '$' + (q.premium || 0).toFixed(2);
            currentScenario.premium = q.premium;
            currentScenario.quote_id = q.quote_id;
          })
          .catch(function () {
            var el = document.getElementById('premium-display');
            if (el) el.textContent = '$3.12';
            currentScenario.premium = 3.12;
            currentScenario.quote_id = 'QTY' + Date.now();
          });

        bindCheckbox(subtotal);
      }

      function bindCheckbox(subtotal) {
        var checkbox = document.getElementById('add-insurance');
        var statusEl = document.getElementById('insurance-status');
        var insuranceRow = document.getElementById('insurance-row');
        var insuranceLabel = document.getElementById('insurance-label');
        var insuranceAmount = document.getElementById('insurance-amount');
        var totalEl = document.getElementById('total');
        var payBtn = document.getElementById('pay-btn');

        if (!checkbox) return;

        checkbox.checked = false;
        insuranceRow.style.display = 'none';
        statusEl.className = 'safecover-status';
        statusEl.textContent = '';

        checkbox.onchange = function () {
          if (checkbox.checked) {
            var premium = currentScenario.premium || 3.12;
            var newTotal = subtotal + premium;

            if (currentScenario) {
              fetch(API + '/api/policy/bind', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'X-API-Key': 'demo' },
                body: JSON.stringify({
                  quote_id: currentScenario.quote_id || 'QTY' + Date.now(),
                  transaction_id: 'ORD_' + Date.now(),
                  customer: {
                    email: 'customer@example.com',
                    name: 'Demo Policyholder',
                    address: { line1: '123 Demo Street', city: 'New York', postal_code: '10001', country: 'US' },
                  },
                  billing: { cardholder_name: 'Demo Policyholder' },
                  items: currentScenario.quote_items || [{ value: subtotal }],
                  premium_paid: premium,
                  scenario: currentScenario.id
                })
              })
                .then(function (r) { return r.json(); })
                .then(function () {
                  statusEl.textContent = "You're protected! Policy issued ✓";
                  statusEl.className = 'safecover-status show success';
                })
                .catch(function () {
                  statusEl.textContent = 'Protection added ✓';
                  statusEl.className = 'safecover-status show success';
                });
            }

            insuranceLabel.textContent = currentScenario.cart_label || 'Protection';
            insuranceAmount.textContent = '$' + premium.toFixed(2);
            insuranceRow.style.display = 'flex';
            totalEl.textContent = '$' + newTotal.toFixed(2);
            payBtn.textContent = (scenarioData[currentScenario.id]?.payLabel || 'Pay') + ' $' + newTotal.toFixed(2);
          } else {
            insuranceRow.style.display = 'none';
            totalEl.textContent = '$' + subtotal.toFixed(2);
            payBtn.textContent = (scenarioData[currentScenario.id]?.payLabel || 'Pay') + ' $' + subtotal.toFixed(2);
            statusEl.className = 'safecover-status';
            statusEl.textContent = '';
          }
        };
      }

      fetch(API + '/api/scenarios')
        .then(function (r) { return r.json(); })
        .then(function (data) {
          scenarios = data;
          var html = scenarios.map(function (s) {
            return '<button class="scenario-tab" data-id="' + s.id + '">' + s.icon + ' ' + s.name + '</button>';
          }).join('');
          document.getElementById('scenario-tabs').innerHTML = html;

          document.querySelectorAll('.scenario-tab').forEach(function (btn) {
            btn.onclick = function () {
              document.querySelectorAll('.scenario-tab').forEach(function (b) { b.classList.remove('active'); });
              btn.classList.add('active');
              var scenario = scenarios.find(function (s) { return s.id === btn.dataset.id; });
              if (scenario) renderScenario(scenario);
            };
          });

          if (scenarios.length) {
            document.querySelector('.scenario-tab').click();
          }
        })
        .catch(function () {
          scenarios = [
            { id: 'retail', name: 'Retail', icon: '🛒', benefits: ['Covers loss/damage', 'Up to $1,000'], label: 'Add protection', cart_label: 'Insurance' },
            { id: 'logistics', name: 'Logistics', icon: '📦', benefits: ['Shipping protection', 'Up to $5,000'], label: 'Add shipping protection', cart_label: 'Shipping Protection' },
            { id: 'healthcare', name: 'Healthcare', icon: '🏥', benefits: ['Appointment protection', 'Up to $500'], label: 'Add appointment protection', cart_label: 'Appointment Protection' },
            { id: 'hospitality', name: 'Hospitality', icon: '🏨', benefits: ['Trip cancellation', 'Up to $2,000'], label: 'Add trip protection', cart_label: 'Trip Protection' },
            { id: 'food', name: 'Food', icon: '🍔', benefits: ['Delivery guarantee', 'Up to $200'], label: 'Add delivery guarantee', cart_label: 'Delivery Guarantee' },
            { id: 'cyber', name: 'Cyber', icon: '🔒', benefits: ['Data breach protection', 'Up to $1,000'], label: 'Add cyber protection', cart_label: 'Cyber Protection' },
            { id: 'mobility', name: 'Mobility', icon: '🚗', benefits: ['Per-trip accident cover', 'Up to $1,000'], label: 'Add trip insurance', cart_label: 'Trip Insurance' },
            { id: 'parametric', name: 'Parametric', icon: '🌦️', benefits: ['Auto-payout on trigger', 'No claims paperwork'], label: 'Add parametric cover', cart_label: 'Parametric Cover' },
            { id: 'gadgets', name: 'Gadgets', icon: '📱', benefits: ['Accidental damage & theft', 'Up to $1,500'], label: 'Add device protection', cart_label: 'Device Protection' },
            { id: 'events', name: 'Events', icon: '🎫', benefits: ['Cancel for any reason', 'Up to $300'], label: 'Add ticket protection', cart_label: 'Ticket Protection' }
          ];
          document.getElementById('scenario-tabs').innerHTML = scenarios.map(function (s) {
            return '<button class="scenario-tab" data-id="' + s.id + '">' + s.icon + ' ' + s.name + '</button>';
          }).join('');
          document.querySelectorAll('.scenario-tab').forEach(function (btn) {
            btn.onclick = function () {
              document.querySelectorAll('.scenario-tab').forEach(function (b) { b.classList.remove('active'); });
              btn.classList.add('active');
              renderScenario(scenarios.find(function (s) { return s.id === btn.dataset.id; }));
            };
          });
          document.querySelector('.scenario-tab').click();
        });

      document.getElementById('btn-desktop').onclick = function () {
        document.getElementById('checkout-frame').className = 'checkout-frame desktop';
        document.getElementById('btn-desktop').classList.add('active');
        document.getElementById('btn-mobile').classList.remove('active');
      };
      document.getElementById('btn-mobile').onclick = function () {
        document.getElementById('checkout-frame').className = 'checkout-frame mobile';
        document.getElementById('btn-mobile').classList.add('active');
        document.getElementById('btn-desktop').classList.remove('active');
      };
    })();
  </script>
</body>
</html>
